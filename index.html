<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Tracking Pipeline</title>
    </head>
<body>

    <div id="metrics-summary"></div>
    <table id="task-table">
        <thead>
            <tr>
                <th>Task ID</th>
                <th>Assignee</th>
                <th>Description</th>
                <th>Created Date (PH)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="task-rows">
            </tbody>
    </table>

    <script>
        // Global variables for session management and local data cache
        let _supabase; 
        let sessionUser = { username: "current_user", role: "staff" }; // Fallback placeholder
        let localTasksCache = [];

        // Initialize Supabase Connection (Ensure your configuration keys are linked)
        function initSupabaseConnection(supabaseClientInstance) {
            _supabase = supabaseClientInstance;
        }

        /**
         * Core Helper: Computes the numeric day of the week strictly following Philippine Time.
         * Prevents localized machine settings or UTC offsets from misaligning operational days.
         * * @param {string|null} dateString - Timestamp from database
         * @returns {number} 0 (Sunday) to 6 (Saturday)
         */
        function getPhilippineDayOfWeek(dateString = null) {
            const targetDate = dateString ? new Date(dateString) : new Date();
            
            // Forces conversion using Asia/Manila timezone rules to fetch the exact local weekday string
            const phWeekdayStr = targetDate.toLocaleDateString('en-US', {
                timeZone: 'Asia/Manila',
                weekday: 'long'
            });

            const weekdayMap = {
                'Sunday': 0, 
                'Monday': 1, 
                'Tuesday': 2, 
                'Wednesday': 3, 
                'Thursday': 4, 
                'Friday': 5, 
                'Saturday': 6
            };

            return weekdayMap[phWeekdayStr];
        }

        /**
         * Formats UTC database timestamps into a clean Philippine standard date string for UI display.
         */
        function formatPhilippineDateTime(dateString) {
            if (!dateString) return "N/A";
            return new Date(dateString).toLocaleString('en-US', {
                timeZone: 'Asia/Manila',
                dateStyle: 'medium',
                timeStyle: 'short'
            });
        }

        /**
         * Fetches records from Supabase, applying security rules and custom Monday-to-Saturday PH filters.
         */
        async function fetchPipelineData() {
            try {
                if (!_supabase) {
                    console.warn("Supabase client is not initialized.");
                    return;
                }

                let query = _supabase.from('tasks').select('*');

                // Access Control Rule: Non-admin users are restricted to their own uncompleted tasks
                if (sessionUser.role !== 'admin') {
                    query = query.eq('assignee', sessionUser.username).eq('completed', false);
                } else {
                    query = query.order('id', { ascending: false });
                }

                const { data, error } = await query;
                if (error) throw error;

                // Processing Loop: Apply strict Philippine Monday-to-Saturday schedule filter
                localTasksCache = (data || []).filter(task => {
                    const phDay = getPhilippineDayOfWeek(task.created_at);
                    
                    // 1 = Monday, 6 = Saturday. Automatically drops 0 (Sunday) logs.
                    return phDay >= 1 && phDay <= 6;
                });

                calculateMetricsSummary();
                renderTableRows();
            } catch(e) {
                console.error("Pipeline Sync Error:", e);
                generateToast("Failed loading task tracking entries.", "error");
            }
        }

        /**
         * Processes metrics for dashboard tiles based on filtered data.
         */
        function calculateMetricsSummary() {
            const container = document.getElementById('metrics-summary');
            if (!container) return;

            const totalActive = localTasksCache.length;
            container.innerHTML = `<strong>Active Monday-Saturday Workload Total:</strong> ${totalActive} rows managed.`;
        }

        /**
         * Renders the processed dataset into clean HTML line items.
         */
        function renderTableRows() {
            const tbody = document.getElementById('task-rows');
            if (!tbody) return;

            if (localTasksCache.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: #888;">No tasks logged for this Mon-Sat period.</td></tr>`;
                return;
            }

            tbody.innerHTML = localTasksCache.map(task => `
                <tr>
                    <td>${task.id}</td>
                    <td>${task.assignee || 'Unassigned'}</td>
                    <td>${task.description || ''}</td>
                    <td>${formatPhilippineDateTime(task.created_at)}</td>
                    <td>
                        <span class="badge ${task.completed ? 'status-done' : 'status-pending'}">
                            ${task.completed ? 'Completed' : 'Pending'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        /**
         * Optional UI Feedback Toast Helper
         */
        function generateToast(message, type = "info") {
            console.log(`[Toast Notification - ${type.toUpperCase()}]: ${message}`);
        }

        // Auto-run routine on script loading
        // window.addEventListener('DOMContentLoaded', () => { fetchPipelineData(); });
    </script>
</body>
</html>
