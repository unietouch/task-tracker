<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Connected Task Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .screen { display: none; }
        .screen.active { display: block; }

        h2 { margin-bottom: 20px; font-size: 24px; text-align: center; color: #111827; }
        h3 { margin-top: 25px; margin-bottom: 10px; font-size: 18px; color: #374151; border-top: 1px dashed var(--border); padding-top: 15px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 500; }

        input[type="text"], input[type="password"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
        }

        button {
            width: 100%; padding: 11px; background-color: var(--primary); color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: #475569; width: auto; padding: 6px 12px; font-size: 13px; margin-top: 5px;}
        .btn-secondary:hover { background-color: #334155; }
        .btn-danger { background-color: #dc2626; padding: 6px 12px; font-size: 12px; width: auto; }
        .btn-danger:hover { background-color: #b91c1c; }

        .header-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .user-info { font-weight: 600; font-size: 14px; }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .action-lnk { color: var(--primary); cursor: pointer; font-size: 14px; text-decoration: underline; }

        .task-item { display: flex; align-items: flex-start; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; background: #fff; }
        .task-item.completed { background-color: #f0fdf4; border-color: #bbf7d0; }
        .task-checkbox { margin-top: 4px; margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }
        .task-details { flex-grow: 1; }
        .task-text { font-size: 15px; font-weight: 500; }
        .task-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }
        .task-remarks { font-size: 13px; color: #047857; margin-top: 4px; font-style: italic; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 100;
        }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
        .admin-task-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid var(--border); }
        
        .loading-text { text-align: center; color: var(--text-light); padding: 10px; font-style: italic; }
        .flex-row { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-login" class="screen active">
        <h2>Account Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password">
        </div>
        <button onclick="handleLogin()">Login</button>
    </div>

    <div id="screen-user" class="screen">
        <div class="header-nav">
            <div class="user-info">Welcome, <span id="display-user">User</span></div>
            <div class="nav-actions">
                <div class="action-lnk" onclick="openPasswordModal()">Change Password</div>
                <div class="action-lnk" style="color:#dc2626;" onclick="logout()">Logout</div>
            </div>
        </div>
        <h2>My Assigned Tasks</h2>
        <div id="user-task-list"></div>
    </div>

    <div id="screen-admin" class="screen">
        <div class="header-nav">
            <div class="user-info">System Administrator</div>
            <div class="nav-actions">
                <div class="action-lnk" onclick="openPasswordModal()">Change Password</div>
                <div class="action-lnk" style="color:#dc2626;" onclick="logout()">Logout</div>
            </div>
        </div>
        <h2>Admin Management Panel</h2>
        
        <h3>Create New User Account</h3>
        <div class="form-group">
            <label>New Username</label>
            <input type="text" id="new-user-name" placeholder="e.g. jvillaver">
        </div>
        <div class="form-group">
            <label>Default Password</label>
            <input type="text" id="new-user-pass" value="123">
        </div>
        <button class="btn-secondary" onclick="createUserAccount()">Create Account</button>

        <h3>Assign New Task</h3>
        <div class="form-group">
            <label>Assign To</label>
            <select id="task-assignee"></select>
        </div>
        <div class="form-group">
            <label>Task Description</label>
            <input type="text" id="task-desc" placeholder="What needs to be done?">
        </div>
        <button onclick="createTask()">Assign Task</button>

        <h3>All Tasks Audit Log</h3>
        <div id="admin-task-list"></div>
    </div>
</div>

<div id="remarks-modal" class="modal">
    <div class="modal-content">
        <h3>Complete Task</h3>
        <div class="form-group">
            <label>Add Completion Remarks / Notes</label>
            <textarea id="modal-remarks-text" rows="3" placeholder="Enter details..."></textarea>
        </div>
        <button onclick="submitTaskCompletion()">Submit & Lock Task</button>
        <button class="btn-secondary" style="background:#64748b; margin-top:8px; width:100%;" onclick="closeModal('remarks-modal')">Cancel</button>
    </div>
</div>

<div id="password-modal" class="modal">
    <div class="modal-content">
        <h3>Update Password</h3>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="new-password-input" placeholder="Enter new password">
        </div>
        <button onclick="submitPasswordChange()">Update Password</button>
        <button class="btn-secondary" style="background:#64748b; margin-top:8px; width:100%;" onclick="closeModal('password-modal')">Cancel</button>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURATION: PASTE YOUR SUPABASE CREDENTIALS HERE
    // ==========================================
    const SUPABASE_URL = "https://vwuhpzpagmahzaqyczuw.supabase.co/rest/v1/"; 
    const SUPABASE_KEY = "sb_publishable_GMw--3rEN77JEs4V1_12GA_49xoRpyG";
    
    // Initialize Supabase Client
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentTaskToCompleteId = null;

    // --- AUTHENTICATION ENGINE (QUERIES CLOUD) ---
    async function handleLogin() {
        const userIn = document.getElementById('login-username').value.trim();
        const passIn = document.getElementById('login-password').value;

        if (!userIn || !passIn) {
            alert('Please complete both fields.');
            return;
        }

        // Query the cloud table for matching credentials dynamically
        let { data: users, error } = await _supabase
            .from('app_users')
            .select('*')
            .eq('username', userIn)
            .eq('password', passIn);

        if (error) {
            alert('Database network connectivity error.');
            return;
        }

        if (users && users.length > 0) {
            currentUser = { username: users[0].username, role: users[0].role, id: users[0].id };
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            navigateDashboard();
        } else {
            alert('Invalid credentials. Access Denied.');
        }
    }

    function logout() {
        currentUser = null;
        switchScreen('screen-login');
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }

    function navigateDashboard() {
        if (currentUser.role === 'admin') {
            switchScreen('screen-admin');
            populateAssigneeDropdown();
            renderAdminView();
        } else {
            switchScreen('screen-user');
            document.getElementById('display-user').innerText = currentUser.username;
            renderUserView();
        }
    }

    // --- CHANGE PASSWORD ENGINE ---
    function openPasswordModal() {
        document.getElementById('new-password-input').value = '';
        document.getElementById('password-modal').classList.add('active');
    }

    async function submitPasswordChange() {
        const newPass = document.getElementById('new-password-input').value.trim();
        if (!newPass) {
            alert('Password string cannot be empty.');
            return;
        }

        const { error } = await _supabase
            .from('app_users')
            .update({ password: newPass })
            .eq('id', currentUser.id);

        if (error) {
            alert('Failed to update password in cloud.');
        } else {
            alert('Password updated successfully!');
            closeModal('password-modal');
        }
    }

    // --- DYNAMIC USER SEED ENGINE ---
    async function createUserAccount() {
        const username = document.getElementById('new-user-name').value.trim().toLowerCase();
        const password = document.getElementById('new-user-pass').value.trim();

        if (!username || !password) {
            alert('Please supply both username and default password values.');
            return;
        }

        const { error } = await _supabase
            .from('app_users')
            .insert([{ username: username, password: password, role: 'user' }]);

        if (error) {
            alert('Username might already exist or database rejected the push.');
        } else {
            alert(`User account "${username}" created!`);
            document.getElementById('new-user-name').value = '';
            populateAssigneeDropdown(); // Refresh assigning lists
        }
    }

    async function populateAssigneeDropdown() {
        const dropdown = document.getElementById('task-assignee');
        let { data: users } = await _supabase.from('app_users').select('username').eq('role', 'user');
        
        dropdown.innerHTML = '';
        if (users) {
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.username;
                opt.innerText = u.username;
                dropdown.appendChild(opt);
            });
        }
    }

    // --- USER DASHBOARD ENGINE ---
    async function renderUserView() {
        const container = document.getElementById('user-task-list');
        container.innerHTML = '<div class="loading-text">Fetching data from cloud database...</div>';

        let { data: tasks, error } = await _supabase
            .from('tasks')
            .select('*')
            .eq('assignee', currentUser.username)
            .order('id', { ascending: false });

        container.innerHTML = '';

        if (error || !tasks || tasks.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:var(--text-light); margin-top:20px;">No tasks assigned to you.</p>';
            return;
        }

        tasks.forEach(task => {
            const div = document.createElement('div');
            div.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            div.innerHTML = `
                <input type="checkbox" class="task-checkbox" 
                    ${task.completed ? 'checked disabled' : ''} 
                    onchange="openRemarksModal(${task.id})">
                <div class="task-details">
                    <div class="task-text" style="${task.completed ? 'text-decoration: line-through; color: var(--text-light);' : ''}">${task.description}</div>
                    ${task.completed ? `
                        <div class="task-meta">Accomplished: ${task.timestamp}</div>
                        ${task.remarks ? `<div class="task-remarks">Remarks: ${task.remarks}</div>` : ''}
                    ` : '<div class="task-meta">Status: Pending Completion</div>'}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function openRemarksModal(taskId) {
        currentTaskToCompleteId = taskId;
        document.getElementById('modal-remarks-text').value = '';
        document.getElementById('remarks-modal').classList.add('active');
    }

    async function submitTaskCompletion() {
        const remarks = document.getElementById('modal-remarks-text').value.trim() || 'No remarks left.';
        const formattedDate = new Date().toLocaleString(); 

        const { error } = await _supabase
            .from('tasks')
            .update({ completed: true, timestamp: formattedDate, remarks: remarks })
            .eq('id', currentTaskToCompleteId);

        if (error) alert("Database connection error. Try again.");

        closeModal('remarks-modal');
        renderUserView();
    }

    // --- ADMIN TASK LOGICS ---
    async function createTask() {
        const assignee = document.getElementById('task-assignee').value;
        const desc = document.getElementById('task-desc').value.trim();

        if (!assignee) {
            alert('Please create a user account first before trying to assign tasks.');
            return;
        }
        if (!desc) {
            alert('Please type a task description before assigning.');
            return;
        }

        const { error } = await _supabase
            .from('tasks')
            .insert([{ assignee: assignee, description: desc, completed: false }]);

        if (error) {
            alert("Failed to write to database.");
        } else {
            document.getElementById('task-desc').value = '';
            renderAdminView();
            alert(`Task successfully written to cloud for ${assignee}!`);
        }
    }

    async function undoTask(taskId) {
        if (confirm('Are you sure you want to reopen this task?')) {
            const { error } = await _supabase
                .from('tasks')
                .update({ completed: false, timestamp: null, remarks: null })
                .eq('id', taskId);

            if (!error) renderAdminView();
        }
    }

    async function renderAdminView() {
        const container = document.getElementById('admin-task-list');
        container.innerHTML = '<div class="loading-text">Pulling audit log rows...</div>';

        let { data: tasks, error } = await _supabase
            .from('tasks')
            .select('*')
            .order('id', { ascending: false });

        container.innerHTML = '';

        if (error || !tasks || tasks.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:var(--text-light); margin-top:10px;">No tasks created yet.</p>';
            return;
        }

        tasks.forEach(task => {
            const div = document.createElement('div');
            div.className = 'admin-task-row';
            div.innerHTML = `
                <div style="max-width: 75%;">
                    <strong>[${task.assignee}]</strong> ${task.description}<br>
                    <span style="font-size:11px; color:var(--text-light)">
                        ${task.completed ? `Status: ✅ Complete (${task.timestamp})` : 'Status: ⏳ Pending'}
                    </span>
                </div>
                <div>
                    ${task.completed ? `<button class="btn-danger" onclick="undoTask(${task.id})">Undo / Reset</button>` : ''}
                </div>
            `;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
